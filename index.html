
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            background: #1a252f;
            font-weight: bold;
            font-size: 1.2em;
        }
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .user-item {
            padding: 10px;
            margin: 5px 0;
            background: #34495e;
            border-radius: 10px;
            font-size: 0.9em;
        }
        .user-item.current {
            background: #27ae60;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 20px;
            background: #ecf0f1;
            border-bottom: 1px solid #bdc3c7;
            font-weight: bold;
            color: #2c3e50;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        .message.own {
            align-items: flex-end;
        }
        .message-bubble {
            max-width: 60%;
            padding: 10px 15px;
            border-radius: 18px;
            position: relative;
        }
        .message.own .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.other .message-bubble {
            background: white;
            color: #333;
            border: 1px solid #ddd;
            border-bottom-left-radius: 4px;
        }
        .message-time {
            font-size: 0.7em;
            margin-top: 5px;
            color: #7f8c8d;
        }
        .message-username {
            font-size: 0.8em;
            font-weight: bold;
            margin-bottom: 5px;
            color: #3498db;
        }
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #ecf0f1;
            display: flex;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 25px;
            outline: none;
            font-size: 1em;
        }
        #sendButton {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        #sendButton:hover {
            background: #5a67d8;
        }
        .image-preview {
            max-width: 200px;
            max-height: 150px;
            border-radius: 10px;
            margin: 5px 0;
        }
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            min-width: 300px;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 1em;
        }
        .login-box button {
            padding: 12px 40px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
        }
        h3 {
            color: #2c3e50;
        }
        .attachment-btn {
            background: #ecf0f1;
            border: none;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h3>Вход в мессенджер</h3>
            <input type="text" id="usernameInput" placeholder="Введите ваше имя" maxlength="20">
            <button id="joinButton">Войти</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">
                📱 Пользователи онлайн
            </div>
            <div class="users-list" id="usersList">
                <div class="user-item">Загрузка...</div>
            </div>
        </div>
        <div class="chat-area">
            <div class="chat-header">
                💬 Общий чат
            </div>
            <div class="messages-area" id="messagesArea">
                <div class="message other">
                    <div class="message-bubble">Добро пожаловать в чат!</div>
                </div>
            </div>
            <div class="input-area">
                <button class="attachment-btn" id="imageBtn">📎</button>
                <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
                <button id="sendButton">📤 Отправить</button>
            </div>
        </div>
    </div>

    <input type="file" id="imageInput" accept="image/*" style="display: none;">

    <script>
        let ws = null;
        let currentUser = '';

        const loginOverlay = document.getElementById('loginOverlay');
        const chatContainer = document.getElementById('chatContainer');
        const joinButton = document.getElementById('joinButton');
        const usernameInput = document.getElementById('usernameInput');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const messagesArea = document.getElementById('messagesArea');
        const usersList = document.getElementById('usersList');
        const imageBtn = document.getElementById('imageBtn');
        const imageInput = document.getElementById('imageInput');

        function addMessage(username, text, time, isOwn, isImage = false, imageData = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;
            
            let content = '';
            if (!isOwn) {
                content += `<div class="message-username">${escapeHtml(username)}</div>`;
            }
            
            if (isImage && imageData) {
                content += `<img src="${imageData}" class="image-preview" alt="image">`;
            } else if (text) {
                content += `<div class="message-bubble">${escapeHtml(text)}</div>`;
            }
            
            content += `<div class="message-time">${escapeHtml(time)}</div>`;
            
            messageDiv.innerHTML = content;
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateUsersList(users) {
            usersList.innerHTML = '';
            users.forEach(user => {
                const userDiv = document.createElement('div');
                userDiv.className = 'user-item';
                if (user === currentUser) {
                    userDiv.className += ' current';
                    userDiv.innerHTML = `👤 ${escapeHtml(user)} (Вы)`;
                } else {
                    userDiv.innerHTML = `👤 ${escapeHtml(user)}`;
                }
                usersList.appendChild(userDiv);
            });
        }

        joinButton.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            if (username === '') {
                alert('Введите имя!');
                return;
            }
            currentUser = username;
            
            ws = new WebSocket(`ws://localhost:8000/ws/${encodeURIComponent(username)}`);
            
            ws.onopen = () => {
                loginOverlay.style.display = 'none';
                chatContainer.style.display = 'flex';
                messageInput.focus();
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'user_list') {
                    updateUsersList(data.users);
                } else if (data.type === 'message') {
                    const isOwn = data.username === currentUser;
                    addMessage(data.username, data.text, data.time, isOwn, data.is_image, data.image_data);
                }
            };
            
            ws.onerror = (error) => {
                console.error('Ошибка:', error);
                alert('Ошибка подключения. Убедитесь, что сервер запущен!');
            };
            
            ws.onclose = () => {
                console.log('Отключено');
            };
        });
        
        function sendMessage() {
            const text = messageInput.value.trim();
            if (text === '') return;
            
            ws.send(JSON.stringify({
                text: text,
                is_image: false
            }));
            messageInput.value = '';
            messageInput.focus();
        }
        
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        imageBtn.addEventListener('click', () => {
            imageInput.click();
        });
        
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    ws.send(JSON.stringify({
                        text: '',
                        is_image: true,
                        image_data: evt.target.result
                    }));
                };
                reader.readAsDataURL(file);
            }
            imageInput.value = '';
        });
    </script>
</body>
</html>
