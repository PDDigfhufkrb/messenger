<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>HEmax — безопасный мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
            font-size: 16px;
        }

        /* Основной контейнер */
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            background: #ffffff;
        }

        /* ===== БОКОВАЯ ПАНЕЛЬ ===== */
        .sidebar {
            width: 320px;
            background: #fafafa;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            background: #ffffff;
            border-bottom: 1px solid #e0e0e0;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 16px;
        }

        .logo span {
            color: #667eea;
        }

        .current-user {
            background: #f0f2f5;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .current-user-avatar {
            width: 48px;
            height: 48px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .current-user-info {
            flex: 1;
        }

        .current-user-name {
            font-weight: 600;
            font-size: 16px;
            color: #1a1a1a;
        }

        .current-user-status {
            font-size: 13px;
            color: #666;
        }

        .search-box {
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px;
            background: #f0f2f5;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
        }

        .search-box input:focus {
            background: #e8e8e8;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.15s;
        }

        .chat-item:hover {
            background: #f5f5f5;
        }

        .chat-item.active {
            background: #e8f0fe;
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            background: #e8e8e8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            margin-right: 14px;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            font-size: 16px;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .chat-preview {
            font-size: 13px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-meta {
            text-align: right;
            flex-shrink: 0;
        }

        .chat-time {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 4px;
        }

        .unread-badge {
            background: #667eea;
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 20px;
            min-width: 22px;
            text-align: center;
        }

        /* ===== ОСНОВНАЯ ОБЛАСТЬ ===== */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            min-width: 0;
        }

        .chat-header {
            padding: 16px 20px;
            background: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
        }

        .back-button {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            margin-right: 12px;
            color: #1a1a1a;
        }

        .chat-header-avatar {
            width: 44px;
            height: 44px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            margin-right: 14px;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-weight: 700;
            font-size: 18px;
            color: #1a1a1a;
        }

        .chat-header-status {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        .typing-area {
            padding: 8px 20px;
            background: #fafafa;
            border-bottom: 1px solid #e0e0e0;
            font-size: 12px;
            color: #888;
            min-height: 36px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }

        .message {
            display: flex;
            margin-bottom: 16px;
        }

        .message.own {
            justify-content: flex-end;
        }

        .message.other {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 20px;
            position: relative;
        }

        .message.own .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.other .message-bubble {
            background: white;
            color: #1a1a1a;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .message-username {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #667eea;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-meta {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            font-size: 10px;
        }

        .message.own .message-meta {
            justify-content: flex-end;
            color: rgba(255,255,255,0.7);
        }

        .message.other .message-meta {
            color: #aaa;
        }

        .message-reply {
            font-size: 12px;
            padding: 6px 10px;
            background: rgba(0,0,0,0.05);
            border-radius: 12px;
            margin-bottom: 6px;
            cursor: pointer;
        }

        .input-area {
            padding: 16px 20px;
            background: #ffffff;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 14px 18px;
            background: #f0f2f5;
            border: none;
            border-radius: 28px;
            font-size: 16px;
            outline: none;
        }

        .input-area input:focus {
            background: #e8e8e8;
        }

        .input-area button {
            background: #667eea;
            border: none;
            padding: 12px 24px;
            border-radius: 28px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .input-area button:hover {
            opacity: 0.9;
        }

        /* Окно входа */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .login-box {
            width: 380px;
            padding: 40px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            text-align: center;
        }

        .login-box h1 {
            font-size: 32px;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .login-box h1 span {
            color: #667eea;
        }

        .login-box p {
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
        }

        .login-box input {
            width: 100%;
            padding: 16px;
            background: #f0f2f5;
            border: none;
            border-radius: 28px;
            font-size: 16px;
            margin-bottom: 16px;
            text-align: center;
            outline: none;
        }

        .login-box button {
            width: 100%;
            padding: 16px;
            background: #667eea;
            border: none;
            border-radius: 28px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }

        .error-message {
            color: #e53e3e;
            font-size: 13px;
            margin-top: 16px;
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.25s ease;
                width: 280px;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .back-button {
                display: block;
            }

            .message-bubble {
                max-width: 85%;
            }
        }

        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f0f0f0;
        }
        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">HE<span>max</span></div>
                <div class="current-user" id="currentUserPanel">
                    <div class="current-user-avatar" id="currentUserAvatar">👤</div>
                    <div class="current-user-info">
                        <div class="current-user-name" id="currentUserName">Загрузка...</div>
                        <div class="current-user-status">онлайн</div>
                    </div>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск чатов...">
            </div>
            <div class="chats-list" id="chatsList"></div>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <button class="back-button" id="backButton">←</button>
                <div class="chat-header-avatar" id="chatAvatar">💬</div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chatHeaderName">Выберите чат</div>
                    <div class="chat-header-status" id="chatHeaderStatus"></div>
                </div>
            </div>
            <div class="typing-area" id="typingArea"></div>
            <div class="messages-container" id="messagesContainer">
                <div style="text-align: center; padding: 40px; color: #aaa;">Выберите чат, чтобы начать общение</div>
            </div>
            <div class="input-area" id="inputArea" style="display: none;">
                <input type="text" id="messageInput" placeholder="Введите сообщение...">
                <button id="sendButton">Отправить</button>
            </div>
        </div>
    </div>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h1>HE<span>max</span></h1>
            <p>безопасный мессенджер</p>
            <input type="text" id="usernameInput" placeholder="Ваше имя" maxlength="20">
            <button id="joinButton">Войти</button>
            <div id="loginError" class="error-message"></div>
        </div>
    </div>

    <script>
        // ============================================
        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ============================================
        let ws = null;
        let currentUser = '';
        let currentUserId = '';
        let currentChat = null;
        let chats = [];
        let messages = [];
        let reconnectAttempts = 0;
        let typingTimeout = null;

        // DOM элементы
        const sidebar = document.getElementById('sidebar');
        const chatsList = document.getElementById('chatsList');
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const chatHeaderName = document.getElementById('chatHeaderName');
        const chatHeaderStatus = document.getElementById('chatHeaderStatus');
        const chatAvatar = document.getElementById('chatAvatar');
        const typingArea = document.getElementById('typingArea');
        const backButton = document.getElementById('backButton');
        const searchInput = document.getElementById('searchInput');
        const currentUserName = document.getElementById('currentUserName');
        const currentUserAvatar = document.getElementById('currentUserAvatar');
        const loginOverlay = document.getElementById('loginOverlay');
        const usernameInput = document.getElementById('usernameInput');
        const joinButton = document.getElementById('joinButton');
        const loginError = document.getElementById('loginError');
        const inputArea = document.getElementById('inputArea');

        // ============================================
        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp * 1000);
            return date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        // ============================================
        // ОБНОВЛЕНИЕ СПИСКА ЧАТОВ
        // ============================================
        function updateChatsList() {
            const searchTerm = searchInput.value.toLowerCase();
            const filtered = chats.filter(chat => 
                chat.title.toLowerCase().includes(searchTerm)
            );

            if (filtered.length === 0) {
                chatsList.innerHTML = '<div style="padding: 40px; text-align: center; color: #aaa;">Нет чатов</div>';
                return;
            }

            chatsList.innerHTML = filtered.map(chat => `
                <div class="chat-item ${currentChat === chat.chat_id ? 'active' : ''}" data-chat-id="${chat.chat_id}">
                    <div class="chat-avatar">${chat.type === 'private' ? '👤' : '👥'}</div>
                    <div class="chat-info">
                        <div class="chat-name">${escapeHtml(chat.title)}</div>
                        <div class="chat-preview">${escapeHtml(chat.last_message || 'Нет сообщений')}</div>
                    </div>
                    <div class="chat-meta">
                        ${chat.last_message_time ? `<div class="chat-time">${formatTime(chat.last_message_time)}</div>` : ''}
                        ${chat.unread ? `<div class="unread-badge">${chat.unread}</div>` : ''}
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.chat-item').forEach(el => {
                el.addEventListener('click', () => {
                    const chatId = el.dataset.chatId;
                    switchChat(chatId);
                    if (window.innerWidth <= 768) {
                        sidebar.classList.remove('open');
                    }
                });
            });
        }

        // ============================================
        // ПЕРЕКЛЮЧЕНИЕ ЧАТА
        // ============================================
        function switchChat(chatId) {
            currentChat = chatId;
            const chat = chats.find(c => c.chat_id === chatId);
            
            if (chat) {
                chatHeaderName.textContent = chat.title;
                chatHeaderStatus.textContent = chat.type === 'private' ? 'Личный чат' : 'Групповой чат';
                chatAvatar.textContent = chat.type === 'private' ? '👤' : '👥';
                
                // Отправляем сигнал о входе в чат
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'join_chat',
                        chat_id: chatId
                    }));
                }
                
                // Показываем поле ввода
                inputArea.style.display = 'flex';
                messagesContainer.innerHTML = '<div style="text-align: center; padding: 40px; color: #aaa;">Загрузка сообщений...</div>';
            }
            
            updateChatsList();
        }

        // ============================================
        // ОТОБРАЖЕНИЕ СООБЩЕНИЙ
        // ============================================
        function renderMessages() {
            if (messages.length === 0) {
                messagesContainer.innerHTML = '<div style="text-align: center; padding: 40px; color: #aaa;">Нет сообщений. Напишите что-нибудь!</div>';
                return;
            }

            messagesContainer.innerHTML = messages.map(msg => {
                const isOwn = msg.from === currentUser;
                return `
                    <div class="message ${isOwn ? 'own' : 'other'}">
                        <div class="message-bubble">
                            ${!isOwn ? `<div class="message-username">${escapeHtml(msg.from)}</div>` : ''}
                            ${msg.reply_to ? `<div class="message-reply">↳ Ответ на сообщение</div>` : ''}
                            <div class="message-text">${escapeHtml(msg.text)}</div>
                            <div class="message-meta">
                                <span>${formatTime(msg.timestamp)}</span>
                                ${msg.edited ? '<span>(ред.)</span>' : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // ============================================
        // ДОБАВЛЕНИЕ СООБЩЕНИЯ В UI
        // ============================================
        function addMessageToUI(msg) {
            const isOwn = msg.from === currentUser;
            const messageHtml = `
                <div class="message ${isOwn ? 'own' : 'other'}">
                    <div class="message-bubble">
                        ${!isOwn ? `<div class="message-username">${escapeHtml(msg.from)}</div>` : ''}
                        ${msg.reply_to ? `<div class="message-reply">↳ Ответ на сообщение</div>` : ''}
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        <div class="message-meta">
                            <span>${formatTime(msg.timestamp)}</span>
                            ${msg.edited ? '<span>(ред.)</span>' : ''}
                        </div>
                    </div>
                </div>
            `;
            messagesContainer.insertAdjacentHTML('beforeend', messageHtml);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // ============================================
        // ОТПРАВКА СООБЩЕНИЯ
        // ============================================
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentChat || !ws) return;
            
            ws.send(JSON.stringify({
                type: 'send_message',
                chat_id: currentChat,
                text: text
            }));
            
            messageInput.value = '';
        }

        // ============================================
        // ИНДИКАТОР НАБОРА ТЕКСТА
        // ============================================
        function sendTyping() {
            if (!currentChat || !ws) return;
            ws.send(JSON.stringify({
                type: 'typing',
                chat_id: currentChat
            }));
        }

        messageInput.addEventListener('input', () => {
            if (typingTimeout) clearTimeout(typingTimeout);
            sendTyping();
            typingTimeout = setTimeout(() => {}, 1000);
        });

        // ============================================
        // ПОДКЛЮЧЕНИЕ WEBSOCKET
        // ============================================
        function connectWebSocket(username) {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.host;
            ws = new WebSocket(`${protocol}//${host}/ws/${encodeURIComponent(username)}`);
            
            ws.onopen = () => {
                console.log('WebSocket connected');
                reconnectAttempts = 0;
                loginOverlay.style.display = 'none';
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'error') {
                    loginError.textContent = data.message;
                    return;
                }
                
                if (data.type === 'chats') {
                    chats = data.chats;
                    updateChatsList();
                }
                
                if (data.type === 'users') {
                    // Обновляем список пользователей (для будущих фич)
                }
                
                if (data.type === 'history') {
                    messages = data.messages || [];
                    renderMessages();
                }
                
                if (data.type === 'new_message') {
                    if (data.chat_id === currentChat) {
                        addMessageToUI(data.message);
                    }
                    // Обновляем список чатов
                    ws.send(JSON.stringify({ type: 'get_chats' }));
                }
                
                if (data.type === 'typing') {
                    if (data.chat_id === currentChat && data.from !== currentUser) {
                        typingArea.innerHTML = `${escapeHtml(data.from)} печатает...`;
                        setTimeout(() => {
                            if (typingArea.innerHTML.includes(data.from)) {
                                typingArea.innerHTML = '';
                            }
                        }, 2000);
                    }
                }
                
                if (data.type === 'message_sent') {
                    // Обновляем список чатов
                    ws.send(JSON.stringify({ type: 'get_chats' }));
                }
            };
            
            ws.onclose = () => {
                console.log('WebSocket disconnected');
                if (reconnectAttempts < 10) {
                    setTimeout(() => {
                        reconnectAttempts++;
                        connectWebSocket(username);
                    }, 1000 * Math.min(5, reconnectAttempts));
                }
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        // ============================================
        // РЕГИСТРАЦИЯ/ВХОД
        // ============================================
        async function login(username) {
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username })
                });
                const result = await response.json();
                
                if (result.success) {
                    currentUser = username;
                    currentUserName.textContent = username;
                    currentUserAvatar.textContent = username.charAt(0).toUpperCase();
                    connectWebSocket(username);
                } else {
                    // Пользователь уже существует — пробуем войти
                    connectWebSocket(username);
                    currentUser = username;
                    currentUserName.textContent = username;
                    currentUserAvatar.textContent = username.charAt(0).toUpperCase();
                    loginOverlay.style.display = 'none';
                }
            } catch (error) {
                loginError.textContent = 'Ошибка соединения с сервером';
            }
        }

        joinButton.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            if (username.length < 2) {
                loginError.textContent = 'Имя должно содержать минимум 2 символа';
                return;
            }
            if (username.length > 20) {
                loginError.textContent = 'Имя не должно превышать 20 символов';
                return;
            }
            login(username);
        });

        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') joinButton.click();
        });

        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        backButton.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });

        searchInput.addEventListener('input', () => {
            updateChatsList();
        });

        // Автообновление списка чатов каждые 5 секунд
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'get_chats' }));
            }
        }, 5000);
    </script>
</body>
</html>
