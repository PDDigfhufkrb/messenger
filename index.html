<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <title>HEmax — безопасный мессенджер</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Контейнер чата */
        .chat-app {
            width: 100%;
            max-width: 1400px;
            height: 100vh;
            background: #1a1a2e;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Боковая панель (список чатов) */
        .sidebar {
            width: 320px;
            background: #16213e;
            color: white;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #0f3460;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            background: #0f3460;
            font-weight: bold;
            font-size: 1.3em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .current-user-badge {
            font-size: 0.8em;
            background: #1a1a2e;
            padding: 5px 10px;
            border-radius: 20px;
        }

        .search-box {
            padding: 15px;
            background: #0f3460;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: none;
            border-radius: 25px;
            background: #1a1a2e;
            color: white;
            outline: none;
            font-size: 0.9em;
        }

        .search-box input::placeholder {
            color: #888;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            padding: 12px 15px;
            margin: 5px 0;
            background: #0f3460;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-item:hover {
            background: #1a4a7a;
            transform: translateX(5px);
        }

        .chat-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .chat-avatar {
            width: 45px;
            height: 45px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: bold;
            margin-bottom: 3px;
        }

        .chat-preview {
            font-size: 0.75em;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 0.7em;
            color: #aaa;
        }

        /* Основная область чата */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1a2e;
        }

        .chat-header {
            padding: 15px 20px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-button {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
        }

        .chat-header-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
        }

        .chat-header-info h3 {
            font-size: 1.1em;
            margin-bottom: 3px;
            color: white;
        }

        .chat-header-info p {
            font-size: 0.75em;
            color: #aaa;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }

        .message.own {
            align-self: flex-end;
        }

        .message.other {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
            position: relative;
        }

        .message.own .message-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.other .message-bubble {
            background: #0f3460;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .message-username {
            font-size: 0.75em;
            font-weight: bold;
            margin-bottom: 4px;
            color: #667eea;
        }

        .message-time {
            font-size: 0.65em;
            margin-top: 4px;
            color: #888;
        }

        .message.own .message-time {
            text-align: right;
        }

        .image-preview {
            max-width: 200px;
            max-height: 150px;
            border-radius: 10px;
            cursor: pointer;
        }

        .input-area {
            padding: 15px 20px;
            background: #16213e;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .emoji-btn, .attach-btn {
            background: #0f3460;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.2s;
        }

        .emoji-btn:hover, .attach-btn:hover {
            background: #1a4a7a;
            transform: scale(1.05);
        }

        #messageInput {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 25px;
            background: #0f3460;
            color: white;
            font-size: 1em;
            outline: none;
        }

        #sendButton {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        #sendButton:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        /* Окно входа */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .login-box {
            background: #16213e;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .login-box h1 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .login-box p {
            color: #aaa;
            margin-bottom: 30px;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            background: #0f3460;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1em;
            text-align: center;
        }

        .login-box button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            width: 100%;
        }

        .error-message {
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 0.9em;
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .back-button {
                display: block;
            }

            .message {
                max-width: 85%;
            }
        }

        /* Стили для уведомлений */
        .notification-badge {
            background: #ff4757;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.7em;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="chat-app" id="chatApp">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>HEmax</span>
                <div class="current-user-badge" id="currentUserBadge"></div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск чатов...">
            </div>
            <div class="chats-list" id="chatsList">
                <div style="text-align: center; padding: 20px; color: #888;">Загрузка...</div>
            </div>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <button class="back-button" id="backButton">←</button>
                <div class="chat-header-avatar" id="chatAvatar">💬</div>
                <div class="chat-header-info">
                    <h3 id="currentChatName">Общий чат</h3>
                    <p id="currentChatStatus">Все участники</p>
                </div>
            </div>
            <div class="messages-area" id="messagesArea">
                <div style="text-align: center; padding: 20px; color: #888;">Выберите чат</div>
            </div>
            <div class="input-area" id="inputArea" style="display: none;">
                <button class="emoji-btn" id="emojiBtn">😊</button>
                <button class="attach-btn" id="attachBtn">📎</button>
                <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
                <button id="sendButton">📤</button>
            </div>
        </div>
    </div>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h1>HEmax</h1>
            <p>Безопасный мессенджер</p>
            <input type="text" id="usernameInput" placeholder="Ваше имя" maxlength="20">
            <button id="joinButton">Войти</button>
            <div id="loginError" class="error-message"></div>
        </div>
    </div>

    <input type="file" id="imageInput" accept="image/*" style="display: none;">
    <div id="emojiPicker" style="display: none; position: fixed; bottom: 80px; left: 20px; background: #16213e; border-radius: 15px; padding: 10px; z-index: 1000;"></div>

    <script>
        let ws = null;
        let currentUser = '';
        let currentChat = 'all'; // 'all' или имя пользователя
        let activeChats = new Map(); // имя чата -> последнее сообщение
        let allUsers = [];

        // DOM элементы
        const loginOverlay = document.getElementById('loginOverlay');
        const sidebar = document.getElementById('sidebar');
        const chatsList = document.getElementById('chatsList');
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const currentChatName = document.getElementById('currentChatName');
        const currentChatStatus = document.getElementById('currentChatStatus');
        const chatAvatar = document.getElementById('chatAvatar');
        const backButton = document.getElementById('backButton');
        const inputArea = document.getElementById('inputArea');
        const currentUserBadge = document.getElementById('currentUserBadge');
        const usernameInput = document.getElementById('usernameInput');
        const joinButton = document.getElementById('joinButton');
        const loginError = document.getElementById('loginError');
        const attachBtn = document.getElementById('attachBtn');
        const imageInput = document.getElementById('imageInput');
        const searchInput = document.getElementById('searchInput');
        const emojiBtn = document.getElementById('emojiBtn');

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function addMessageToUI(fromUser, text, time, isOwn, isImage, imageData, isPrivate = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;
            
            let content = '';
            if (!isOwn && isPrivate) {
                content += `<div class="message-username">${escapeHtml(fromUser)}</div>`;
            }
            
            if (isImage && imageData) {
                content += `<img src="${imageData}" class="image-preview" onclick="window.open(this.src)">`;
            } else if (text) {
                content += `<div class="message-bubble">${escapeHtml(text)}</div>`;
            }
            
            content += `<div class="message-time">${escapeHtml(time)}</div>`;
            messageDiv.innerHTML = content;
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function updateChatsList() {
            const searchTerm = searchInput.value.toLowerCase();
            let chats = Array.from(activeChats.keys());
            
            // Всегда показываем общий чат
            if (!chats.includes('all')) {
                activeChats.set('all', { preview: 'Общий чат', time: '' });
            }
            
            let filteredChats = chats.filter(chat => chat.toLowerCase().includes(searchTerm));
            
            if (filteredChats.length === 0) {
                chatsList.innerHTML = '<div style="text-align: center; padding: 20px; color: #888;">Нет чатов</div>';
                return;
            }
            
            chatsList.innerHTML = filteredChats.map(chat => {
                const isActive = (currentChat === chat);
                const chatData = activeChats.get(chat) || { preview: 'Нет сообщений', time: '' };
                let displayName = chat === 'all' ? '📢 Общий чат' : `👤 ${chat}`;
                if (chat === currentUser) displayName = `📝 Заметки (${chat})`;
                
                return `
                    <div class="chat-item ${isActive ? 'active' : ''}" data-chat="${chat}">
                        <div class="chat-avatar">${chat === 'all' ? '📢' : '👤'}</div>
                        <div class="chat-info">
                            <div class="chat-name">${escapeHtml(displayName)}</div>
                            <div class="chat-preview">${escapeHtml(chatData.preview)}</div>
                        </div>
                        ${chatData.time ? `<div class="chat-time">${chatData.time}</div>` : ''}
                    </div>
                `;
            }).join('');
            
            // Добавляем обработчики кликов
            document.querySelectorAll('.chat-item').forEach(el => {
                el.addEventListener('click', () => {
                    const chatName = el.dataset.chat;
                    switchChat(chatName);
                    if (window.innerWidth <= 768) {
                        sidebar.classList.remove('open');
                    }
                });
            });
        }

        function switchChat(chatName) {
            currentChat = chatName;
            messagesArea.innerHTML = '';
            
            if (chatName === 'all') {
                currentChatName.textContent = 'Общий чат';
                currentChatStatus.textContent = 'Все участники';
                chatAvatar.textContent = '📢';
            } else if (chatName === currentUser) {
                currentChatName.textContent = 'Мои заметки';
                currentChatStatus.textContent = 'Только для вас';
                chatAvatar.textContent = '📝';
            } else {
                currentChatName.textContent = chatName;
                currentChatStatus.textContent = 'Личный чат';
                chatAvatar.textContent = '💬';
            }
            
            updateChatsList();
            inputArea.style.display = 'flex';
            
            // Запрашиваем историю сообщений для этого чата
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'get_history',
                    chat: chatName
                }));
            }
        }

        function updateCurrentUserBadge() {
            currentUserBadge.textContent = currentUser;
        }

        // WebSocket соединение
        joinButton.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            if (username === '') {
                loginError.textContent = 'Введите имя!';
                return;
            }
            
            currentUser = username;
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.host;
            ws = new WebSocket(`${protocol}//${host}/ws/${encodeURIComponent(username)}`);
            
            ws.onopen = () => {
                loginOverlay.style.display = 'none';
                updateCurrentUserBadge();
                activeChats.set('all', { preview: 'Общий чат', time: '' });
                activeChats.set(currentUser, { preview: 'Мои заметки', time: '' });
                updateChatsList();
                switchChat('all');
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'error') {
                    loginError.textContent = data.message;
                    ws.close();
                    return;
                }
                
                if (data.type === 'user_list') {
                    allUsers = data.users;
                    // Добавляем всех пользователей в список чатов (кроме себя)
                    data.users.forEach(user => {
                        if (user !== currentUser && !activeChats.has(user)) {
                            activeChats.set(user, { preview: 'Нажмите для чата', time: '' });
                        }
                    });
                    updateChatsList();
                }
                
                if (data.type === 'message') {
                    if (currentChat === 'all') {
                        addMessageToUI(data.username, data.text, data.time, data.username === currentUser, data.is_image, data.image_data);
                    }
                    // Обновляем превью в списке чатов
                    activeChats.set('all', { preview: data.text.substring(0, 30), time: data.time });
                    updateChatsList();
                }
                
                if (data.type === 'private_message') {
                    const fromUser = data.from_user;
                    if (currentChat === fromUser || currentChat === currentUser) {
                        addMessageToUI(fromUser, data.text, data.timestamp, fromUser === currentUser, data.is_image, data.image_data, true);
                    }
                    activeChats.set(fromUser, { preview: data.text.substring(0, 30), time: data.timestamp });
                    updateChatsList();
                    
                    // Уведомление
                    if (fromUser !== currentUser && currentChat !== fromUser) {
                        new Notification(`HEmax: ${fromUser}`, { body: data.text });
                    }
                }
            };
            
            ws.onerror = () => {
                loginError.textContent = 'Ошибка подключения к серверу';
            };
            
            ws.onclose = () => {
                console.log('Соединение закрыто');
            };
        });
        
        function sendMessage() {
            const text = messageInput.value.trim();
            if (text === '') return;
            
            if (currentChat === 'all') {
                ws.send(JSON.stringify({
                    type: 'message',
                    text: text,
                    is_image: false
                }));
            } else {
                ws.send(JSON.stringify({
                    type: 'private_message',
                    to_user: currentChat,
                    text: text,
                    is_image: false
                }));
            }
            messageInput.value = '';
        }
        
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        attachBtn.addEventListener('click', () => {
            imageInput.click();
        });
        
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    if (currentChat === 'all') {
                        ws.send(JSON.stringify({
                            type: 'message',
                            text: '',
                            is_image: true,
                            image_data: evt.target.result
                        }));
                    } else {
                        ws.send(JSON.stringify({
                            type: 'private_message',
                            to_user: currentChat,
                            text: '',
                            is_image: true,
                            image_data: evt.target.result
                        }));
                    }
                };
                reader.readAsDataURL(file);
            }
            imageInput.value = '';
        });
        
        backButton.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });
        
        // Мобильное меню
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !backButton.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });
        
        // Эмодзи
        emojiBtn.addEventListener('click', () => {
            const emojis = ['😀', '😂', '😍', '🥰', '😎', '🤔', '😢', '🎉', '❤️', '🔥', '👍', '👎'];
            const picker = document.getElementById('emojiPicker');
            if (picker.style.display === 'none' || !picker.style.display) {
                picker.innerHTML = emojis.map(e => `<span style="font-size: 1.5em; margin: 5px; cursor: pointer;">${e}</span>`).join('');
                picker.style.display = 'block';
                picker.querySelectorAll('span').forEach(span => {
                    span.addEventListener('click', () => {
                        messageInput.value += span.textContent;
                        picker.style.display = 'none';
                        messageInput.focus();
                    });
                });
            } else {
                picker.style.display = 'none';
            }
        });
        
        document.addEventListener('click', (e) => {
            if (!emojiBtn.contains(e.target)) {
                document.getElementById('emojiPicker').style.display = 'none';
            }
        });
        
        searchInput.addEventListener('input', () => {
            updateChatsList();
        });
        
        // Запрос разрешения на уведомления
        if ('Notification' in window && Notification.permission !== 'granted') {
            Notification.requestPermission();
        }
    </script>
</body>
</html>
